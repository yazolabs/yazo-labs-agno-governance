services:
  agentos-db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    volumes:
      - agno_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai} -d ${DB_DATABASE:-ai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  agentos-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      RUNTIME_ENV: ${RUNTIME_ENV:-prd}
      AGNO_DEBUG: ${AGNO_DEBUG:-False}
      PYTHONPATH: /app

      DB_HOST: agentos-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
      DB_DRIVER: ${DB_DRIVER:-postgresql+psycopg}

      WAIT_FOR_DB: "True"
      PRINT_ENV_ON_LOAD: "False"

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}

      AGENTOS_URL: ${AGENTOS_URL}
      JWT_VERIFICATION_KEY: ${JWT_VERIFICATION_KEY:-}
    depends_on:
      agentos-db:
        condition: service_healthy
    expose:
      - "8000"